apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-lbc-test-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aws-lbc-test-echo
  template:
    metadata:
      labels:
        app: aws-lbc-test-echo
    spec:
      containers:
        - name: echo
          image: ealen/echo-server:0.9.2
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
          readinessProbe:
            httpGet:
              path: /
              port: 80
